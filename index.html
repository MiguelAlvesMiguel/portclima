<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portclima: soluções de engenharia, climatização, eficiência energética e assistência técnica desde 1999."
    />
    <title>Portclima | Soluções de Energia e Climatização</title>
  </head>
  <body>
    <form name="contacto-portclima" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contacto-portclima" />
      <input name="bot-field" />
      <input name="nome" />
      <input name="telefone" />
      <input name="email" />
      <input name="localidade" />
      <select name="servico">
        <option>Ar condicionado</option>
        <option>Caldeiras e esquentadores</option>
        <option>Painéis solares</option>
        <option>Fugas de água</option>
        <option>Outro</option>
      </select>
      <textarea name="mensagem"></textarea>
    </form>
    <form name="orcamento-trabalho" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="orcamento-trabalho" />
      <input name="bot-field" />
      <input name="projeto" />
      <input name="nome" />
      <input name="telefone" />
      <input name="email" />
      <input name="localidade" />
      <textarea name="mensagem"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
